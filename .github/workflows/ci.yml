name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-backend:
    name: Python backend (FastAPI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Compile-check
        run: python -m compileall backend

  java17-backend:
    name: Java 17 backend (Spring Boot 3.2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Compile
        run: mvn -B -q compile
        working-directory: backend-java

  java8-backend:
    name: Java 8 backend (Spring Boot 2.7)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "8"
          cache: maven
      - name: Compile
        run: mvn -B -q compile
        working-directory: backend-java8
