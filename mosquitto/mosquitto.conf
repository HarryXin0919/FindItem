# Mosquitto 配置
# 启动方式: mosquitto -c mosquitto/mosquitto.conf
#
# 监听端口 1883,要求账号密码;passwords 文件由 scripts/init-mqtt-passwd.ps1 生成
# 局域网内 ESP32 / 后端用同一个账号 findit_backend / findit123(改密请同时改后端环境变量与 ESP32 ino)

listener 1883 0.0.0.0
allow_anonymous false
password_file mosquitto/passwords

# 日志(方便看连接情况)
log_type error
log_type warning
log_type notice
log_type information
connection_messages true

# 持久化:demo 不需要重启保留消息,关掉简单
persistence false
